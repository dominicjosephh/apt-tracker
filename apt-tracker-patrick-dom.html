<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Apt Tracker — Patrick + Dom</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#faf7f2; --ink:#14110f; --ink-2:#4a4642; --mute:#8a847e;
  --line:#ece6df; --line-2:#d9d2c9; --card:#ffffff;
  --accent:#6b5cff; --accent-soft:#efecff; --accent-ink:#3f37a8;
  --green:#0e8562; --green-soft:#e4f5ed;
  --amber:#a86708; --amber-soft:#fbeecd;
  --red:#b23939; --red-soft:#fbe5e3;
  --blue:#1866c0; --blue-soft:#e5f0fc;
  --gold:#c6870f;
  --shadow-sm:0 1px 2px rgba(20,17,15,.04);
  --shadow-md:0 2px 6px rgba(20,17,15,.05),0 10px 30px -12px rgba(20,17,15,.10);
  --shadow-lg:0 10px 28px -10px rgba(20,17,15,.18),0 2px 6px rgba(20,17,15,.06);
}
html,body{height:100%;}
body{
  font-family:-apple-system,BlinkMacSystemFont,'Inter','Segoe UI',sans-serif;
  color:var(--ink); font-size:14px; line-height:1.5;
  background:var(--bg);
  background-image:
    radial-gradient(1200px 400px at 12% -100px, #f1ecff 0%, transparent 60%),
    radial-gradient(900px 400px at 95% -80px, #e6f5ee 0%, transparent 55%),
    radial-gradient(800px 360px at 60% 110%, #fff1e8 0%, transparent 55%);
  background-attachment:fixed;
  -webkit-font-smoothing:antialiased;
}
.wrap{max-width:960px;margin:0 auto;padding:2rem 1.1rem 5rem;}

/* ---------- header ---------- */
.header{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:1.5rem;flex-wrap:wrap;gap:14px;}
h1{
  font-size:30px; font-weight:700; color:var(--ink);
  letter-spacing:-.02em; display:flex; align-items:center; gap:10px;
}
h1::before{
  content:""; display:inline-block; width:30px; height:30px;
  background:linear-gradient(140deg,#ffd7a8 0%,#ff97a0 55%,#a988ff 100%);
  border-radius:9px; box-shadow:inset 0 0 0 2px #fff, var(--shadow-sm);
}
.subtitle{font-size:13px;color:var(--ink-2);margin-top:6px;}
.subtitle b{color:var(--ink);font-weight:600;}
.budget-tag{
  display:inline-flex; align-items:center; gap:6px;
  padding:4px 10px 4px 8px; background:var(--accent-soft); color:var(--accent-ink);
  border-radius:999px; font-size:12px; font-weight:600; margin-top:8px;
  border:1px solid #d7d1ff;
}
.budget-tag::before{content:"";width:6px;height:6px;border-radius:50%;background:var(--accent);}
.add-btn{
  padding:10px 18px; background:var(--ink); color:#fff;
  border:none; border-radius:10px; font-size:13px; font-weight:600; cursor:pointer;
  box-shadow:var(--shadow-md); transition:transform .12s ease, box-shadow .12s ease, background .12s;
}
.add-btn:hover{background:#2a2520; transform:translateY(-1px); box-shadow:var(--shadow-lg);}
.add-btn:active{transform:translateY(0);}

/* ---------- who bar ---------- */
.who-bar{
  display:flex; align-items:center; gap:10px; margin-bottom:1.25rem;
  padding:10px 14px; background:var(--card); border-radius:14px;
  border:1px solid var(--line); box-shadow:var(--shadow-sm); flex-wrap:wrap;
}
.who-label{font-size:12px;color:var(--mute);margin-right:2px;font-weight:500;text-transform:uppercase;letter-spacing:.05em;}
.who-btn{
  padding:6px 12px 6px 8px; border-radius:999px; border:1px solid var(--line-2);
  background:#fff; font-size:12px; cursor:pointer; color:var(--ink-2);
  font-weight:500; display:inline-flex; align-items:center; gap:7px;
  transition:all .15s ease;
}
.who-btn::before{
  content:attr(data-initial); width:20px; height:20px; border-radius:50%;
  background:#e9e3db; color:var(--ink-2); font-size:10px; font-weight:700;
  display:grid; place-items:center; letter-spacing:0;
}
.who-btn:hover{border-color:var(--ink-2);transform:translateY(-1px);}
.who-btn.ap{background:var(--accent-soft);color:var(--accent-ink);border-color:#c8c1ff;font-weight:600;}
.who-btn.ap::before{background:var(--accent);color:#fff;}
.who-btn.ad{background:var(--green-soft);color:var(--green);border-color:#9fdcc2;font-weight:600;}
.who-btn.ad::before{background:var(--green);color:#fff;}
.sync-info{
  font-size:11px;color:var(--mute);margin-left:auto;
  display:inline-flex;align-items:center;gap:6px;
  padding:4px 10px;background:#f5f1ea;border-radius:999px;
}
.sync-dot{width:7px;height:7px;border-radius:50%;display:inline-block;}
.sync-dot.on{background:#22c55e;box-shadow:0 0 0 3px rgba(34,197,94,.18);}
.sync-dot.off{background:#dc2626;box-shadow:0 0 0 3px rgba(220,38,38,.18);}
.sync-dot.loading{background:#f59e0b;animation:pulse 1.2s infinite;}
.sync-dot.flash{background:var(--accent);animation:pulse .9s infinite;}
@keyframes pulse{0%,100%{opacity:.45}50%{opacity:1}}

/* ---------- config banner ---------- */
.config-banner{
  background:#fff4e5; border:1px solid #f2b97a; color:#7a4808;
  padding:12px 14px; border-radius:12px; margin-bottom:1rem; font-size:13px; line-height:1.5;
  box-shadow:var(--shadow-sm);
}
.config-banner b{font-weight:600;}
.config-banner code{background:#fff;padding:1px 5px;border-radius:4px;font-size:12px;font-family:ui-monospace,SFMono-Regular,Menlo,monospace;}

/* ---------- stats ---------- */
.summary-row{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:1.5rem;}
.stat{
  background:var(--card); border-radius:14px; border:1px solid var(--line);
  padding:14px 16px; box-shadow:var(--shadow-sm); position:relative; overflow:hidden;
  transition:transform .15s ease, box-shadow .15s ease;
}
.stat:hover{transform:translateY(-1px);box-shadow:var(--shadow-md);}
.stat::before{
  content:""; position:absolute; top:0; left:0; right:0; height:3px;
  background:var(--line);
}
.stat:nth-child(1)::before{background:var(--ink);}
.stat:nth-child(2)::before{background:var(--blue);}
.stat:nth-child(3)::before{background:var(--green);}
.stat:nth-child(4)::before{background:var(--accent);}
.stat:nth-child(5)::before{background:var(--amber);}
.stat-n{font-size:26px;font-weight:700;color:var(--ink);letter-spacing:-.02em;line-height:1.1;}
.stat-l{font-size:11px;color:var(--mute);margin-top:4px;text-transform:uppercase;letter-spacing:.06em;font-weight:500;}
.stat-warn{color:var(--amber);}

/* ---------- toolbar ---------- */
.toolbar{
  display:flex;gap:8px;margin-bottom:1rem;flex-wrap:wrap;
  padding:10px; background:rgba(255,255,255,.65); backdrop-filter:blur(8px);
  border-radius:14px; border:1px solid var(--line);
}
.toolbar input,.toolbar select{
  padding:8px 12px; border:1px solid var(--line-2); border-radius:9px;
  font-size:13px; background:#fff; outline:none; color:var(--ink);
  transition:border-color .12s, box-shadow .12s;
}
.toolbar input{width:200px;}
.toolbar input:focus,.toolbar select:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft);}

/* ---------- cards ---------- */
.card{
  background:var(--card); border:1px solid var(--line); border-radius:16px;
  padding:16px 18px; margin-bottom:12px; box-shadow:var(--shadow-sm);
  transition:transform .15s ease, box-shadow .2s ease, border-color .15s;
  position:relative; overflow:hidden;
}
.card::before{
  content:""; position:absolute; left:0; top:0; bottom:0; width:3px;
  background:linear-gradient(180deg,var(--accent) 0%,#9b8dff 100%); opacity:.8;
}
.card:hover{transform:translateY(-2px); box-shadow:var(--shadow-md); border-color:var(--line-2);}
.card.over{border-color:#f0b89e;background:linear-gradient(180deg,#fffaf7 0%,#fff 100%);}
.card.over::before{background:linear-gradient(180deg,#e07a4e 0%,#d95a3a 100%);}
.card-top{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:12px;}
.card-name{font-size:17px;font-weight:700;color:var(--ink);letter-spacing:-.01em;}
.card-meta{font-size:12.5px;color:var(--mute);margin-top:3px;}
.tags{display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-top:7px;}
.badge{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:999px;font-size:11px;font-weight:600;letter-spacing:.01em;}
.badge::before{content:"";width:5px;height:5px;border-radius:50%;background:currentColor;opacity:.7;}
.b-blue{background:var(--blue-soft);color:var(--blue);}
.b-green{background:var(--green-soft);color:var(--green);}
.b-amber{background:var(--amber-soft);color:var(--amber);}
.b-red{background:var(--red-soft);color:var(--red);}
.b-gray{background:#f1ece4;color:#6a645e;}
.pill{display:inline-block;padding:2px 8px;border-radius:999px;font-size:10.5px;font-weight:600;letter-spacing:.01em;}
.p-gv{background:var(--green-soft);color:var(--green);}
.p-bv{background:#d9f2e6;color:#066147;}
.p-rd{background:#fde4dc;color:#9a3519;}
.p-ov{color:#9a3519;font-size:11px;font-weight:700;display:inline-flex;align-items:center;gap:3px;}
.p-ov::before{content:"↑";font-size:10px;}
.p-fe{color:var(--amber);font-size:11px;font-weight:500;}
.p-hs{background:var(--accent-soft);color:var(--accent-ink);font-size:10.5px;font-weight:600;padding:2px 8px;border-radius:999px;}

/* ---------- fields (KPIs per card) ---------- */
.fields{display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:10px 14px;margin-top:10px;padding-top:10px;border-top:1px dashed var(--line);}
.fl{font-size:10px;color:var(--mute);text-transform:uppercase;letter-spacing:.06em;margin-bottom:3px;font-weight:500;}
.fv{font-size:13.5px;color:var(--ink);font-weight:500;}
.fv.pricey{color:#9a3519;font-weight:700;}
/* make the price field pop — it's always the first column */
.fields > div:first-child .fv{font-size:17px;font-weight:700;letter-spacing:-.01em;}
.notes-row{grid-column:1/-1;}
.notes-txt{font-size:12.5px;color:var(--ink-2);line-height:1.55;padding:8px 12px;background:#faf6ef;border-radius:8px;border-left:3px solid var(--line-2);}

/* ---------- actions ---------- */
.actions{display:flex;gap:4px;align-items:center;flex-shrink:0;}
.ib{border:none;background:#f4efe6;cursor:pointer;color:var(--ink-2);font-size:13px;padding:6px 9px;border-radius:8px;transition:background .12s, color .12s;}
.ib:hover{background:#e9e1d2;color:var(--ink);}
.tb{padding:6px 12px;border-radius:8px;border:1px solid #9fdcc2;background:var(--green-soft);color:var(--green);font-size:11px;cursor:pointer;font-weight:600;transition:all .12s;}
.tb:hover{background:#c9ebda;transform:translateY(-1px);}
.stars{color:var(--gold);font-size:13px;letter-spacing:1px;}
.lnk{font-size:11px;color:var(--blue);text-decoration:none;font-weight:500;}
.lnk:hover{text-decoration:underline;}

/* ---------- empty ---------- */
.empty{
  text-align:center;padding:4rem 2rem;color:var(--mute);font-size:14px;
  background:var(--card);border-radius:16px;border:1px dashed var(--line-2);
}
.empty::before{content:"🏡";display:block;font-size:40px;margin-bottom:10px;opacity:.7;}

/* ---------- modal ---------- */
.overlay{display:none;position:fixed;inset:0;background:rgba(20,17,15,.45);backdrop-filter:blur(4px);z-index:100;align-items:flex-start;justify-content:center;padding-top:40px;overflow-y:auto;}
.overlay.open{display:flex;}
.modal{background:var(--card);border-radius:18px;padding:1.75rem;width:520px;max-width:95vw;margin-bottom:40px;box-shadow:var(--shadow-lg);}
.modal h2{font-size:18px;font-weight:700;margin-bottom:1.25rem;letter-spacing:-.01em;}
.fg{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.fgrp{display:flex;flex-direction:column;gap:5px;}
.fgrp.full{grid-column:1/-1;}
.fgrp label{font-size:11.5px;color:var(--ink-2);font-weight:600;text-transform:uppercase;letter-spacing:.04em;}
.fgrp input,.fgrp select,.fgrp textarea{padding:9px 11px;border:1px solid var(--line-2);border-radius:9px;font-size:13px;font-family:inherit;outline:none;transition:border-color .12s,box-shadow .12s;background:#fff;}
.fgrp input:focus,.fgrp select:focus,.fgrp textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft);}
.fgrp textarea{resize:vertical;min-height:70px;}
.mf{display:flex;justify-content:flex-end;gap:10px;margin-top:1.25rem;}
.bc{padding:10px 18px;border-radius:10px;border:1px solid var(--line-2);background:#fff;cursor:pointer;font-size:13px;color:var(--ink-2);font-weight:500;}
.bc:hover{background:#f7f2ea;}
.bs{padding:10px 18px;border-radius:10px;border:none;background:var(--ink);color:#fff;cursor:pointer;font-size:13px;font-weight:600;box-shadow:var(--shadow-md);}
.bs:hover{background:#2a2520;transform:translateY(-1px);}

/* rating stars interactive */
.star-row{display:flex;gap:6px;}
.star-btn{background:none;border:none;cursor:pointer;font-size:24px;color:#e2dcd2;padding:0;transition:color .12s, transform .1s;}
.star-btn:hover{transform:scale(1.1);}
.star-btn.lit{color:var(--gold);}

@media(max-width:720px){
  .summary-row{grid-template-columns:repeat(3,1fr);}
  .summary-row .stat:nth-child(4),.summary-row .stat:nth-child(5){grid-column:span 1;}
}
@media(max-width:600px){
  h1{font-size:24px;}
  .wrap{padding:1.25rem .75rem 3rem;}
  .fg{grid-template-columns:1fr;}
  .fgrp.full{grid-column:1;}
  .fields{grid-template-columns:repeat(auto-fit,minmax(90px,1fr));}
  .sync-info{margin-left:0;width:auto;}
  .toolbar input{width:100%;}
  .summary-row{grid-template-columns:repeat(2,1fr);}
}
</style>
</head>
<body>
<div class="wrap">

  <div class="header">
    <div>
      <h1>Apartment tracker</h1>
      <div class="subtitle">Patrick + Dom &nbsp;·&nbsp; Austin TX &nbsp;·&nbsp; Available by 5/1</div>
      <span class="budget-tag">Budget: $3,400/mo combined</span>
    </div>
    <button class="add-btn" onclick="openModal()">+ Add listing</button>
  </div>

  <div id="config-banner-slot"></div>

  <div class="who-bar">
    <span class="who-label">You are:</span>
    <button class="who-btn ap" id="wb-p" data-initial="P" onclick="setWho('patrick')">Patrick</button>
    <button class="who-btn" id="wb-d" data-initial="D" onclick="setWho('dom')">Dom</button>
    <span class="sync-info" id="sync-info"><span class="sync-dot loading"></span>Connecting…</span>
  </div>

  <div class="summary-row" id="summary"></div>

  <div class="toolbar">
    <input type="text" id="fsearch" placeholder="Search name or area…" oninput="render()" />
    <select id="fhood" onchange="render()"><option value="">All areas</option></select>
    <select id="fstatus" onchange="render()">
      <option value="">All statuses</option>
      <option value="interested">Interested</option>
      <option value="tour">Tour scheduled</option>
      <option value="applied">Applied</option>
      <option value="pass">Pass</option>
    </select>
    <select id="fbudget" onchange="render()">
      <option value="">Any price</option>
      <option value="in">In budget (≤$3,400)</option>
      <option value="over">Over budget</option>
    </select>
    <select id="fbeds" onchange="render()">
      <option value="">Any beds</option>
      <option value="2">2 BD</option>
      <option value="3">3 BD</option>
    </select>
    <select id="ftype" onchange="render()">
      <option value="">Any type</option>
      <option value="house">House</option>
      <option value="apt">Apt / condo</option>
    </select>
  </div>

  <div id="list"></div>
</div>

<!-- modal -->
<div class="overlay" id="modal">
  <div class="modal">
    <h2 id="modal-title">Add listing</h2>
    <div class="fg">
      <div class="fgrp full"><label>Name / building</label><input type="text" id="f-name" placeholder="6814 E Riverside Dr #34" /></div>
      <div class="fgrp"><label>Neighborhood / area</label><input type="text" id="f-hood" placeholder="Riverside" /></div>
      <div class="fgrp"><label>Address</label><input type="text" id="f-addr" /></div>
      <div class="fgrp full"><label>Listing URL</label><input type="text" id="f-url" placeholder="https://…" /></div>
      <div class="fgrp"><label>Price / mo ($)</label><input type="number" id="f-price" placeholder="2200" /></div>
      <div class="fgrp"><label>Sq ft</label><input type="number" id="f-sqft" placeholder="1677" /></div>
      <div class="fgrp"><label>Available date</label><input type="date" id="f-avail" /></div>
      <div class="fgrp"><label>Beds / Baths</label><input type="text" id="f-beds" placeholder="3 / 2.5" /></div>
      <div class="fgrp"><label>Type</label>
        <select id="f-type"><option value="apt">Apt / condo</option><option value="house">House</option></select>
      </div>
      <div class="fgrp"><label>Status</label>
        <select id="f-status">
          <option value="interested">Interested</option>
          <option value="tour">Tour scheduled</option>
          <option value="applied">Applied</option>
          <option value="pass">Pass</option>
        </select>
      </div>
      <div class="fgrp"><label>Tour date</label><input type="date" id="f-tour" /></div>
      <div class="fgrp"><label>Fees may apply?</label>
        <select id="f-fees"><option value="0">No</option><option value="1">Yes</option></select>
      </div>
      <div class="fgrp full"><label>Rating</label>
        <div class="star-row" id="star-row">
          <button class="star-btn" data-v="1" onclick="setRating(1)">★</button>
          <button class="star-btn" data-v="2" onclick="setRating(2)">★</button>
          <button class="star-btn" data-v="3" onclick="setRating(3)">★</button>
          <button class="star-btn" data-v="4" onclick="setRating(4)">★</button>
          <button class="star-btn" data-v="5" onclick="setRating(5)">★</button>
        </div>
        <input type="hidden" id="f-rating" value="" />
      </div>
      <div class="fgrp full"><label>Notes</label><textarea id="f-notes" placeholder="Pool, pet friendly, W/D in unit…"></textarea></div>
    </div>
    <div class="mf">
      <button class="bc" onclick="closeModal()">Cancel</button>
      <button class="bs" onclick="saveApt()">Save listing</button>
    </div>
  </div>
</div>

/* ---------- storage helpers ---------- */
function loadLocal(){
  try{ const s=localStorage.getItem(STORE_KEY); if(s) return JSON.parse(s); }catch(e){}
  return null;
}
function saveLocal(){ try{ localStorage.setItem(STORE_KEY,JSON.stringify(apts)); }catch(e){} }

/* ---------- sync status UI ---------- */
function setSync(state,text){
  const el=document.getElementById('sync-info');
  if(!el) return;
  el.innerHTML = `<span class="sync-dot ${state}"></span>${text}`;
}
function flashSync(user){
  const name = user==='patrick' ? 'Patrick' : (user==='dom' ? 'Dom' : 'Someone');
  const el=document.getElementById('sync-info');
  if(!el) return;
  el.innerHTML = `<span class="sync-dot flash"></span>Updated by ${name}`;
  setTimeout(()=>setSync('on','Live — synced'), 2500);
}
function showConfigBanner(msg){
  const slot=document.getElementById('config-banner-slot');
  if(!slot || slot.childElementCount) return;
  const div=document.createElement('div');
  div.className='config-banner';
  div.innerHTML = msg || '<b>Offline mode.</b> Firebase isn\u2019t configured yet \u2014 edits only save in <i>your</i> browser. Open this file and paste your Firebase config into <code>FIREBASE_CONFIG</code> near the top of the <code>&lt;script&gt;</code> block to turn on live sync.';
  slot.appendChild(div);
}

/* ---------- firebase init ---------- */
function configIsValid(){
  return FIREBASE_CONFIG.apiKey
      && !FIREBASE_CONFIG.apiKey.startsWith('PASTE_')
      && FIREBASE_CONFIG.databaseURL
      && !FIREBASE_CONFIG.databaseURL.includes('PASTE_');
}

function initFirebase(){
  if(!configIsValid()){
    fbEnabled=false;
    const local=loadLocal();
    apts = local || SEED.map(a=>({...a}));
    showConfigBanner();
    setSync('off','Offline mode');
    render();
    return;
  }
  try{
    firebase.initializeApp(FIREBASE_CONFIG);
    dbRef = firebase.database().ref(TRACKER_PATH);
    fbEnabled = true;

    // Connection status
    firebase.database().ref('.info/connected').on('value', snap=>{
      if(snap.val()) setSync('on','Live — synced');
      else setSync('off','Offline — retrying');
    });

    // Main data listener
    dbRef.on('value', snap=>{
      const v = snap.val();
      if(!v || !v.apts){
        // Empty DB — seed from local storage (if any) or SEED
        const local=loadLocal();
        apts = local && local.length ? local : SEED.map(a=>({...a}));
        pushState(true);  // initial seed write
        firstSnapshotHandled = true;
        render();
        return;
      }
      firstSnapshotHandled = true;

      // If this update came from us, we already re-rendered optimistically
      if(v.lastClient === CLIENT_ID) return;

      // Normalise apts (Firebase may have dropped array indices)
      apts = Array.isArray(v.apts) ? v.apts : Object.values(v.apts);
      saveLocal();
      render();
      if(v.lastUser) flashSync(v.lastUser);
    }, err=>{
      console.error('Firebase read failed',err);
      showConfigBanner('<b>Can\u2019t reach Firebase.</b> Check that Realtime Database is enabled and its rules allow read/write on <code>/'+TRACKER_PATH+'</code>. Running in offline mode for now.');
      fbEnabled=false;
      const local=loadLocal();
      apts = local || SEED.map(a=>({...a}));
      setSync('off','Offline mode');
      render();
    });
  }catch(e){
    console.error('Firebase init failed',e);
    showConfigBanner('<b>Firebase config error.</b> '+(e.message||'')+'. Running in offline mode.');
    fbEnabled=false;
    const local=loadLocal();
    apts = local || SEED.map(a=>({...a}));
    setSync('off','Offline mode');
    render();
  }
}

function pushState(isInitialSeed){
  saveLocal();
  if(!fbEnabled || !dbRef) return;
  dbRef.set({
    apts,
    lastClient: CLIENT_ID,
    lastUser:   WHO,
    lastUpdate: Date.now(),
    seeded:     true
  }).catch(e=>{
    console.error('Push failed',e);
    if(!isInitialSeed){
      setSync('off','Write failed — check rules');
    }
  });
}

/* ---------- identity ---------- */
function setWho(w){
  WHO=w;
  localStorage.setItem(WHO_KEY,w);
  document.getElementById('wb-p').className='who-btn'+(w==='patrick'?' ap':'');
  document.getElementById('wb-d').className='who-btn'+(w==='dom'?' ad':'');
}

/* ---------- derived / format ---------- */
function isOver(a){ return a.price&&parseFloat(a.price)>BUDGET; }
function ppsf(a){ if(!a.price||!a.sqft) return null; return (parseFloat(a.price)/parseFloat(a.sqft)).toFixed(2); }
function ppPill(v){
  if(!v) return '';
  const n=parseFloat(v);
  if(n<=1.40) return '<span class="pill p-bv">best value</span>';
  if(n<=1.65) return '<span class="pill p-gv">good value</span>';
  if(n>=2.20) return '<span class="pill p-rd">pricey</span>';
  return '';
}
function fmtDate(d){ if(!d) return '—'; const p=d.split('-'); return `${parseInt(p[1])}/${parseInt(p[2])}/${p[0].slice(2)}`; }
function renderStars(n){ if(!n) return '—'; n=Math.min(5,parseInt(n)); return '<span class="stars">'+'★'.repeat(n)+'☆'.repeat(5-n)+'</span>'; }
function sBadge(s){
  const m={interested:'b-blue|Interested',tour:'b-green|Tour scheduled',applied:'b-amber|Applied',pass:'b-red|Pass'};
  const[c,l]=(m[s]||'b-gray|'+s).split('|');
  return `<span class="badge ${c}">${l}</span>`;
}
function getBN(a){ if(!a.beds) return null; return parseInt(a.beds.split('/')[0].trim()); }

function populateHoods(){
  const sel=document.getElementById('fhood');
  const cur=sel.value;
  const hs=[...new Set(apts.map(a=>a.neighborhood).filter(Boolean))].sort();
  sel.innerHTML='<option value="">All areas</option>'+hs.map(h=>`<option value="${h}"${h===cur?' selected':''}>${h}</option>`).join('');
}

function escapeHtml(s){ return (s==null?'':String(s)).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }

function render(){
  populateHoods();
  const q=(document.getElementById('fsearch').value||'').toLowerCase();
  const fh=document.getElementById('fhood').value;
  const fs=document.getElementById('fstatus').value;
  const fb=document.getElementById('fbudget').value;
  const fbd=document.getElementById('fbeds').value;
  const ft=document.getElementById('ftype').value;

  const filtered=apts.filter(a=>{
    if(q&&!((a.name||'').toLowerCase().includes(q)||(a.neighborhood||'').toLowerCase().includes(q)||(a.address||'').toLowerCase().includes(q))) return false;
    if(fh&&a.neighborhood!==fh) return false;
    if(fs&&a.status!==fs) return false;
    if(fb==='in'&&a.price&&parseFloat(a.price)>BUDGET) return false;
    if(fb==='over'&&!(a.price&&parseFloat(a.price)>BUDGET)) return false;
    if(fbd){const bn=getBN(a);if(bn===null||bn!==parseInt(fbd))return false;}
    if(ft&&(a.type||'apt')!==ft) return false;
    return true;
  });

  const total=apts.length;
  const tours=apts.filter(a=>a.status==='tour').length;
  const priced=apts.filter(a=>a.price);
  const avg=priced.length?Math.round(priced.reduce((s,a)=>s+parseFloat(a.price),0)/priced.length):0;
  const overC=apts.filter(isOver).length;
  const houses=apts.filter(a=>a.type==='house').length;

  document.getElementById('summary').innerHTML=`
    <div class="stat"><div class="stat-n">${total}</div><div class="stat-l">Total</div></div>
    <div class="stat"><div class="stat-n">${houses}</div><div class="stat-l">Houses</div></div>
    <div class="stat"><div class="stat-n">${tours}</div><div class="stat-l">Tours set</div></div>
    <div class="stat"><div class="stat-n">${avg?'$'+avg.toLocaleString():'—'}</div><div class="stat-l">Avg price</div></div>
    <div class="stat"><div class="stat-n ${overC?'stat-warn':''}">${overC}</div><div class="stat-l">Over budget</div></div>
  `;

  const listEl=document.getElementById('list');
  if(!filtered.length){ listEl.innerHTML='<div class="empty">No matches — try clearing a filter</div>'; return; }

  listEl.innerHTML=filtered.map(a=>{
    const ri=apts.indexOf(a);
    const ov=isOver(a);
    const pp=ppsf(a);
    const overTag=ov?`<span class="p-ov">+$${(parseFloat(a.price)-BUDGET).toLocaleString()} over budget</span>`:'';
    const feesTag=a.feesApply?`<span class="p-fe">fees may apply</span>`:'';
    const houseTag=a.type==='house'?`<span class="p-hs">house</span>`:'';
    const lnk=a.url?`<a class="lnk" href="${escapeHtml(a.url)}" target="_blank" rel="noopener">↗ listing</a>`:'';
    const tourBtn=a.status==='tour'
      ?`<span style="font-size:11px;color:#888;">${a.tourDate?'Tour: '+fmtDate(a.tourDate):'Tour set'}</span>`
      :`<button class="tb" onclick="scheduleTour(${ri})">+ schedule tour</button>`;
    return `<div class="card${ov?' over':''}">
      <div class="card-top">
        <div style="flex:1;min-width:0;">
          <div class="card-name">${escapeHtml(a.name||'Unnamed')}</div>
          <div class="card-meta">${escapeHtml(a.neighborhood||'')}${a.address?' &middot; '+escapeHtml(a.address):''}</div>
          <div class="tags">${sBadge(a.status)}${houseTag}${overTag}${feesTag}${lnk}</div>
        </div>
        <div class="actions">
          ${tourBtn}
          <button class="ib" onclick="openModal(${ri})" title="Edit">&#9998;</button>
          <button class="ib" onclick="deleteApt(${ri})" title="Remove">&#215;</button>
        </div>
      </div>
      <div class="fields">
        <div><div class="fl">Price</div><div class="fv${ov?' pricey':''}">${a.price?'$'+parseInt(a.price).toLocaleString()+'/mo':'—'}</div></div>
        <div><div class="fl">Sq ft</div><div class="fv">${a.sqft?parseInt(a.sqft).toLocaleString()+' sqft':'—'}</div></div>
        <div><div class="fl">$/sqft</div><div class="fv">${pp?`$${pp} ${ppPill(pp)}`:'—'}</div></div>
        <div><div class="fl">Available</div><div class="fv">${fmtDate(a.avail)}</div></div>
        <div><div class="fl">Beds / Ba</div><div class="fv">${escapeHtml(a.beds||'—')}</div></div>
        <div><div class="fl">Rating</div><div class="fv">${renderStars(a.rating)}</div></div>
        ${a.notes?`<div class="notes-row"><div class="fl">Notes</div><div class="notes-txt">${escapeHtml(a.notes)}</div></div>`:''}
      </div>
    </div>`;
  }).join('');
}

function setRating(v){
  currentRating=v;
  document.getElementById('f-rating').value=v;
  document.querySelectorAll('.star-btn').forEach(b=>{
    b.classList.toggle('lit',parseInt(b.dataset.v)<=v);
  });
}

function openModal(idx){
  editIdx=idx!==undefined?idx:-1;
  editId = editIdx>=0 ? (apts[editIdx]&&apts[editIdx].id) || null : null;
  const a=editIdx>=0?apts[editIdx]:{};
  document.getElementById('modal-title').textContent=editIdx>=0?'Edit listing':'Add listing';
  [['name','name'],['hood','neighborhood'],['addr','address'],['url','url'],['price','price'],['sqft','sqft'],['avail','avail'],['beds','beds'],['notes','notes']].forEach(([id,key])=>{
    const el=document.getElementById('f-'+id); if(el) el.value=a[key]||'';
  });
  document.getElementById('f-type').value=a.type||'apt';
  document.getElementById('f-status').value=a.status||'interested';
  document.getElementById('f-tour').value=a.tourDate||'';
  document.getElementById('f-fees').value=a.feesApply?'1':'0';
  currentRating=parseInt(a.rating)||0;
  document.getElementById('f-rating').value=currentRating||'';
  document.querySelectorAll('.star-btn').forEach(b=>{
    b.classList.toggle('lit',parseInt(b.dataset.v)<=currentRating);
  });
  document.getElementById('modal').classList.add('open');
}

function closeModal(){ document.getElementById('modal').classList.remove('open'); }

function saveApt(){
  const name=document.getElementById('f-name').value.trim();
  if(!name){alert('Please enter a name for this listing.');return;}
  const apt={
    id: editId !== null ? editId : Date.now(),
    name,
    neighborhood:document.getElementById('f-hood').value.trim(),
    address:document.getElementById('f-addr').value.trim(),
    url:document.getElementById('f-url').value.trim(),
    price:document.getElementById('f-price').value,
    sqft:document.getElementById('f-sqft').value,
    avail:document.getElementById('f-avail').value,
    beds:document.getElementById('f-beds').value.trim(),
    type:document.getElementById('f-type').value,
    status:document.getElementById('f-status').value,
    rating:document.getElementById('f-rating').value,
    notes:document.getElementById('f-notes').value.trim(),
    tourDate:document.getElementById('f-tour').value,
    feesApply:document.getElementById('f-fees').value==='1',
    addedBy:WHO,
    updatedAt:Date.now()
  };
  // ID-based upsert so we don't clobber a change the other user made between open and save
  if(editId !== null){
    const real = apts.findIndex(a=>a.id===editId);
    if(real >= 0) apts[real] = apt;
    else apts.push(apt);
  } else {
    apts.push(apt);
  }
  pushState(); closeModal(); render();
}

function deleteApt(i){
  const a=apts[i]; if(!a) return;
  if(confirm('Remove "'+a.name+'" from the list?')){
    apts.splice(i,1); pushState(); render();
  }
}

function scheduleTour(i){
  const d=prompt('Enter tour date (YYYY-MM-DD):');
  if(d&&d.match(/^\d{4}-\d{2}-\d{2}$/)){
    apts[i].status='tour'; apts[i].tourDate=d; pushState(); render();
  } else if(d){
    alert('Please use format YYYY-MM-DD, e.g. 2026-05-03');
  }
}

document.getElementById('modal').addEventListener('click',function(e){
  if(e.target===this) closeModal();
});

// Reflect saved "who" in the UI before first render
setWho(WHO);

// Kick it off
initFirebase();
</script>
